name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  template-checks:
    name: Template checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: template/.nvmrc
          cache: npm
          cache-dependency-path: template/package-lock.json

      - name: Install dependencies (strict)
        run: npm ci

      - name: Doctor (typecheck + format:check + lint + check-spec + test)
        run: npm run doctor

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  init-script-check:
    name: init-web-stack.sh smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [none, admin, consumer]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: template/.nvmrc

      - name: Run init script non-interactively (${{ matrix.preset }}, empty env)
        run: |
          mkdir -p /tmp/smoke-${{ matrix.preset }}
          cd /tmp/smoke-${{ matrix.preset }}
          # 6 lines: app title, app desc, supabase url (skip), supabase key (skip), app url (skip), install? (n)
          printf "Smoke App\nSmoke description\n\n\n\nn\n" | bash "$GITHUB_WORKSPACE/init-web-stack.sh" web --preset=${{ matrix.preset }}

      - name: Verify base files in all variants
        run: |
          project=/tmp/smoke-${{ matrix.preset }}/web
          test -f "$project/package.json"
          test -f "$project/package-lock.json"
          test -f "$project/.nvmrc"
          test -f "$project/.npmrc"
          test -f "$project/.prettierrc.json"
          test -f "$project/.prettierignore"
          test -f "$project/.husky/pre-commit"
          test -x "$project/scripts/check-spec.sh"
          test -f "$project/src/lib/env.ts"
          test -f "$project/src/app/error.tsx"
          test -f "$project/src/app/loading.tsx"
          grep -q '"name": "smoke-' "$project/package.json"
          grep -q '"doctor"' "$project/package.json"
          ! grep -q '"\^' "$project/package.json"
          # Empty env prompts -> no .env.local
          test ! -f "$project/.env.local"

      - name: Verify consumer preset overlay
        if: matrix.preset == 'consumer'
        run: |
          project=/tmp/smoke-consumer/web
          test -f "$project/src/app/(app)/layout.tsx"
          test -f "$project/public/manifest.json"
          test -f "$project/src/lib/theme/theme-provider.tsx"
          test -f "$project/src/lib/i18n/config.ts"
          test -f "$project/src/lib/i18n/provider.tsx"
          grep -q '"i18next"' "$project/package.json"
          grep -q '"react-i18next"' "$project/package.json"
          ! grep -q '"next-intl"' "$project/package.json"
          grep -q 'data-theme="dark"' "$project/src/app/globals.css"
          grep -q '"name": "Smoke App"' "$project/public/manifest.json"
          grep -q 'force-dynamic' "$project/src/app/(app)/layout.tsx"

      - name: Verify admin preset overlay
        if: matrix.preset == 'admin'
        run: |
          project=/tmp/smoke-admin/web
          test -f "$project/src/app/(dashboard)/layout.tsx"
          grep -q '"recharts"' "$project/package.json"
          grep -q 'disallow' "$project/src/app/robots.ts"
          grep -q 'force-dynamic' "$project/src/app/(dashboard)/layout.tsx"

      - name: Verify check-spec rejects force-static in auth route groups
        if: matrix.preset != 'none'
        run: |
          project=/tmp/smoke-${{ matrix.preset }}/web
          # Pick the right route group per preset.
          if [ "${{ matrix.preset }}" = "consumer" ]; then
            offender="$project/src/app/(app)/_force-static-probe.tsx"
          else
            offender="$project/src/app/(dashboard)/_force-static-probe.tsx"
          fi
          printf 'export const dynamic = "force-static"\nexport default function Probe() { return null }\n' > "$offender"
          if (cd "$project" && npm run check-spec); then
            echo "FAIL: check-spec should have rejected force-static under the auth route group"
            rm -f "$offender"
            exit 1
          fi
          rm -f "$offender"

      - name: Install (strict for none, flexible for presets)
        run: |
          cd /tmp/smoke-${{ matrix.preset }}/web
          if [ "${{ matrix.preset }}" = "none" ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Run doctor against the generated project
        run: |
          cd /tmp/smoke-${{ matrix.preset }}/web
          npm run doctor

  init-script-env-prompts:
    name: init-web-stack.sh env prompts smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: template/.nvmrc

      - name: Run init with filled env prompts
        run: |
          mkdir -p /tmp/smoke-env
          cd /tmp/smoke-env
          # 6 lines: title, desc, supabase url, supabase key, app url (default), install? (n)
          printf "Env App\nEnv desc\nhttps://proj.supabase.co\ntest-anon-key\n\nn\n" | bash "$GITHUB_WORKSPACE/init-web-stack.sh" web --preset=none

      - name: Verify .env.local was written
        run: |
          project=/tmp/smoke-env/web
          test -f "$project/.env.local"
          grep -q 'NEXT_PUBLIC_SUPABASE_URL=https://proj.supabase.co' "$project/.env.local"
          grep -q 'NEXT_PUBLIC_SUPABASE_ANON_KEY=test-anon-key' "$project/.env.local"
          grep -q 'NEXT_PUBLIC_APP_URL=http://localhost:3000' "$project/.env.local"
